# OpenSSF Security Insights — machine-readable security posture for this project.
# Spec: https://github.com/ossf/security-insights-spec (schema v2).
# sscsb generated this valid starter. The values marked REPLACE-ME / TODO are
# placeholders — fill them in, then validate with si-tooling (`si validate`).
# `sscsb verify security-insights` reports Info until the placeholders are gone.
#
# Only the `header` + `project` blocks are emitted (both validate on their own).
# Add the optional `repository:` block (status, core-team, license, security
# posture) when you're ready to attest repository-level details.
header:
  schema-version: "2.0.0"
  last-updated: "2026-07-23"
  last-reviewed: "2026-07-23"
  url: "https://github.com/{{repo_slug}}/blob/{{default_branch}}/security-insights.yml"
  comment: |
    Generated by sscs-bootstrapper. Supply-chain controls (secret scanning,
    signing, SBOM, vulnerability scanning, SLSA provenance) are enforced via the
    .sscsb config and .github/workflows installed by `sscsb init`.
project:
  name: "{{repo_slug}}"
  homepage: "https://github.com/{{repo_slug}}"
  administrators:
    # REPLACE-ME: at least one real administrator is required by the schema.
    - name: "REPLACE-ME: primary maintainer"
      primary: true
  repositories:
    - name: "{{repo_slug}}"
      comment: "Primary repository this Security Insights file is published in."
      url: "https://github.com/{{repo_slug}}"
  vulnerability-reporting:
    reports-accepted: true
    bug-bounty-available: false
    # sscsb installs SECURITY.md; adjust if you relocate the policy.
    security-policy: "https://github.com/{{repo_slug}}/blob/{{default_branch}}/SECURITY.md"
    comment: "Report privately via GitHub Security Advisories on this repository."
  documentation:
    detailed-guide: "https://github.com/{{repo_slug}}/blob/{{default_branch}}/SECURITY.md"
