# sscsb (optional control): wait-for-secrets — human-in-the-loop secret
# injection for high-sensitivity workflows. Instead of storing a powerful
# secret in repo/org settings, the workflow PAUSES and a human supplies it
# interactively; it exists only for the run's duration.
#
# This is a SNIPPET: copy the step into the sensitive workflow.
name: Wait For Secrets Example
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sensitive-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - name: Wait for a human to supply the publish token
        id: wait-for-secrets
        uses: step-security/wait-for-secrets@084b3ae774c0e0003a9307ae4f487c10f1f998fe # v1.2.1
        with:
          secrets: |
            PUBLISH_TOKEN:
              name: 'Registry publish token'
              description: 'One-time token for this release'
      - name: Use the supplied secret (never persisted)
        run: |
          echo "Token received (length only): ${#PUBLISH_TOKEN}"
        env:
          PUBLISH_TOKEN: ${{ steps.wait-for-secrets.outputs.PUBLISH_TOKEN }}
