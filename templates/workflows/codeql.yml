# sscsb: CodeQL — deep interprocedural analysis on PRs and the default branch.
#
# The matrix below analyses `actions` only, because that is the one language
# EVERY repo bootstrapped by sscsb has (these workflows), and it is the only
# choice that is guaranteed to run without knowing anything about your project.
# ADD YOUR OWN LANGUAGE(S) — sscsb does not detect them for you, and CodeQL that
# does not read your source code is not analysing your source code.
name: CodeQL
on:
  push:
    branches: ["{{default_branch}}"]
  pull_request:
  schedule:
    - cron: "45 3 * * 2"

permissions:
  contents: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: ["actions"] # e.g. rust, javascript-typescript, python, go
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Initialize CodeQL
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          languages: ${{ matrix.language }}
      - name: Analyze
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          category: "/language:${{ matrix.language }}"
