# sscsb: ClusterFuzzLite continuous fuzzing on PRs — the fuzzing integration
# OpenSSF Scorecard detects for Rust (its `fuzzedWithClusterFuzzLite` probe).
# Requires a cargo-fuzz project in `fuzz/` and `.clusterfuzzlite/{Dockerfile,
# build.sh}` (sscsb ships a starter set; write fuzz targets for YOUR parsers).
# Runs the fuzz targets against each PR's code change for a bounded time.
name: ClusterFuzzLite PR
on:
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  Fuzzing:
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - name: Build fuzzers
        uses: google/clusterfuzzlite/actions/build_fuzzers@884713a6c30a92e5e8544c39945cd7cb630abcd1 # v1
        with:
          language: rust
          sanitizer: address
      - name: Run fuzzers
        uses: google/clusterfuzzlite/actions/run_fuzzers@884713a6c30a92e5e8544c39945cd7cb630abcd1 # v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          fuzz-seconds: 300
          mode: "code-change"
          sanitizer: address
          output-sarif: true
